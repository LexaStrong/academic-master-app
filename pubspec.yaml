name: easy_learn
description: E-learning platform by Nana Kojo.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.1 <4.0.0'

dependencies:
  animations: ^2.0.7
  another_flushbar: ^1.12.30
  auto_route: ^11.1.0
  bloc: ^9.2.0
  cached_network_image: ^3.2.3
  circular_reveal_animation: ^2.0.1
  dartz: ^0.10.1
  equatable: ^2.0.5
  file_picker: ^10.3.10
  supabase_flutter: ^2.4.0
  flip_card: ^0.7.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_cached_pdfview: ^0.4.1
  flutter_feather_icons: ^2.0.0+1
  flutter_hooks: ^0.21.3+1
  flutter_screenutil: ^5.8.4
  flutter_signin_button: ^2.0.0
  flutter_slidable: ^4.0.3
  flutter_spinkit: ^5.2.0
  flutter_svg: ^2.0.6
  flutter_swipe_action_cell: ^3.1.1
  flutter_zoom_drawer: ^3.0.4+1
  fluttertoast: ^9.0.0
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  google_fonts: ^8.0.2
  google_sign_in: ^7.2.0
  http: ^1.6.0
  injectable: ^2.1.2
  json_annotation: ^4.8.1
  kt_dart: ^1.1.0
  line_icons: ^2.0.1
  loading_indicator: ^3.1.0
  lottie: ^3.3.2
  modal_bottom_sheet: ^3.0.0-pre
  nil: ^1.1.1
  path_provider: ^2.0.15
  persistent_bottom_nav_bar: ^6.2.1
  provider: ^6.0.5
  razorpay_flutter: ^1.3.5
  responsive_framework: ^1.0.0
  rxdart: ^0.28.0
  selectable_autolink_text: ^2.6.0
  share: ^2.0.4
  shared_preferences: ^2.1.2
  url_launcher: ^6.1.11
  uuid: ^4.5.3
  webview_flutter: ^4.2.2


dev_dependencies:
  auto_route_generator: ^10.5.0
  build_runner: ^2.4.5
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.7.0
  lint: ^2.1.2

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottiefiles/
    - assets/icons/

  fonts:
    - family: Circular
      fonts:
        - asset: assets/fonts/circular.otf
    - family: Circular_Bold
      fonts:
        - asset: assets/fonts/CircularStdBold.otf
    - family: Circular_Medium
      fonts:
        - asset: assets/fonts/CircularStdMedium.otf
